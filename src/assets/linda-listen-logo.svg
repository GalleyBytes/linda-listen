<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title>Linda Listen logo</title>
  <desc>Two L shapes framing a C-shaped ear in orange and slate blue.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="64" x2="420" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#475569" />
      <stop offset="1" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="orange" x1="126" y1="146" x2="390" y2="382" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdba74" />
      <stop offset="1" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="slate" x1="132" y1="148" x2="384" y2="376" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#cbd5e1" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(264 260) rotate(90) scale(150)">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.22" />
      <stop offset="1" stop-color="#fb923c" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14" />
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)" />
  <circle cx="264" cy="260" r="150" fill="url(#glow)" />
  <circle cx="164" cy="282" r="68" fill="#f97316" opacity="0.11" filter="url(#softGlow)" />
  <circle cx="348" cy="282" r="68" fill="#cbd5e1" opacity="0.09" filter="url(#softGlow)" />

  <path
